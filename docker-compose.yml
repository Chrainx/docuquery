services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docuquery-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuquery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docuquery_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-docuquery}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuquery}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Python Embedding Service
  # ---------------------------------------------------------------------------
  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: docuquery-embedding
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-64}
    ports:
      - "${EMBEDDING_PORT:-8001}:8001"
    volumes:
      - model-cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Go Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuquery-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-docuquery}:${POSTGRES_PASSWORD:-docuquery_dev_password}@postgres:5432/${POSTGRES_DB:-docuquery}?sslmode=disable
      EMBEDDING_SERVICE_URL: http://embedding-service:8001
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      BACKEND_PORT: "8080"
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      embedding-service:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuquery-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  model-cache:
  uploads:
