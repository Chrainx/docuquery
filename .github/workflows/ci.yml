name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Go Backend
  # ===========================================================================
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docuquery
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: docuquery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U docuquery"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://docuquery:test_password@localhost:5432/docuquery_test?sslmode=disable
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ===========================================================================
  # Python Embedding Service
  # ===========================================================================
  embedding-service:
    name: Embedding Service (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: embedding-service/requirements.txt

      - name: Install dependencies
        working-directory: embedding-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint
        working-directory: embedding-service
        run: ruff check app/ tests/

      - name: Format check
        working-directory: embedding-service
        run: ruff format --check app/ tests/

      - name: Run tests
        working-directory: embedding-service
        run: python -m pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: embedding-coverage
          path: embedding-service/coverage.xml

  # ===========================================================================
  # Next.js Frontend
  # ===========================================================================
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        run: npm run build

  # ===========================================================================
  # Docker Build Validation
  # ===========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, embedding-service, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build

      - name: Verify images created
        run: |
          docker images | grep docuquery
